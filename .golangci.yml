run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gofmt
    - goimports
    - revive
    - bodyclose
    - contextcheck
    - errorlint
    - gocritic
    - misspell
    - nilerr
    - unconvert
    - unparam

linters-settings:
  gosec:
    excludes:
      - G104 # handled by errcheck
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
