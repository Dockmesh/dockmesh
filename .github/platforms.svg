<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 260" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <!-- Background -->
  <rect width="880" height="260" rx="16" fill="#020617"/>

  <!-- Title -->
  <text x="32" y="44" font-size="18" font-weight="700" fill="#e8edf0">Platform support</text>
  <text x="32" y="66" font-size="12" fill="#697882">v1: Linux-native server + agent · cross-platform CLI</text>

  <!-- Header row: platform names -->
  <g font-size="12" font-weight="600" fill="#94a3b8">
    <text x="330" y="106" text-anchor="middle">Linux</text>
    <text x="500" y="106" text-anchor="middle">macOS</text>
    <text x="670" y="106" text-anchor="middle">Windows</text>
  </g>

  <!-- Horizontal separator under header -->
  <line x1="32" y1="118" x2="848" y2="118" stroke="#1e293b" stroke-width="1"/>

  <!-- Row: Server -->
  <g font-size="13">
    <text x="32" y="146" font-weight="600" fill="#e8edf0">Server</text>
    <text x="32" y="162" font-size="11" fill="#697882">dockmesh</text>

    <!-- Linux: supported -->
    <g transform="translate(290, 138)">
      <rect width="80" height="26" rx="6" fill="#09c0dd" fill-opacity="0.14" stroke="#09c0dd" stroke-opacity="0.45"/>
      <path d="M 12 13 L 17 18 L 27 8" stroke="#09c0dd" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="17" font-size="12" font-weight="500" fill="#b8f0f9">amd64 · arm64</text>
    </g>

    <!-- macOS: roadmap -->
    <g transform="translate(460, 138)">
      <rect width="80" height="26" rx="6" fill="#64748b" fill-opacity="0.1" stroke="#475569" stroke-opacity="0.4"/>
      <text x="40" y="17" text-anchor="middle" font-size="11" font-weight="500" fill="#94a3b8">roadmap</text>
    </g>

    <!-- Windows: roadmap -->
    <g transform="translate(630, 138)">
      <rect width="80" height="26" rx="6" fill="#64748b" fill-opacity="0.1" stroke="#475569" stroke-opacity="0.4"/>
      <text x="40" y="17" text-anchor="middle" font-size="11" font-weight="500" fill="#94a3b8">roadmap</text>
    </g>
  </g>

  <!-- Row: Agent -->
  <g font-size="13">
    <text x="32" y="190" font-weight="600" fill="#e8edf0">Agent</text>
    <text x="32" y="206" font-size="11" fill="#697882">dockmesh-agent</text>

    <g transform="translate(290, 182)">
      <rect width="80" height="26" rx="6" fill="#09c0dd" fill-opacity="0.14" stroke="#09c0dd" stroke-opacity="0.45"/>
      <path d="M 12 13 L 17 18 L 27 8" stroke="#09c0dd" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="17" font-size="12" font-weight="500" fill="#b8f0f9">amd64 · arm64</text>
    </g>

    <g transform="translate(460, 182)">
      <rect width="80" height="26" rx="6" fill="#64748b" fill-opacity="0.1" stroke="#475569" stroke-opacity="0.4"/>
      <text x="40" y="17" text-anchor="middle" font-size="11" font-weight="500" fill="#94a3b8">roadmap</text>
    </g>

    <g transform="translate(630, 182)">
      <rect width="80" height="26" rx="6" fill="#64748b" fill-opacity="0.1" stroke="#475569" stroke-opacity="0.4"/>
      <text x="40" y="17" text-anchor="middle" font-size="11" font-weight="500" fill="#94a3b8">roadmap</text>
    </g>
  </g>

  <!-- Row: CLI -->
  <g font-size="13">
    <text x="32" y="234" font-weight="600" fill="#e8edf0">CLI</text>
    <text x="32" y="250" font-size="11" fill="#697882">dmctl</text>

    <g transform="translate(290, 226)">
      <rect width="80" height="26" rx="6" fill="#09c0dd" fill-opacity="0.14" stroke="#09c0dd" stroke-opacity="0.45"/>
      <path d="M 12 13 L 17 18 L 27 8" stroke="#09c0dd" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="17" font-size="12" font-weight="500" fill="#b8f0f9">amd64 · arm64</text>
    </g>

    <g transform="translate(460, 226)">
      <rect width="80" height="26" rx="6" fill="#09c0dd" fill-opacity="0.14" stroke="#09c0dd" stroke-opacity="0.45"/>
      <path d="M 12 13 L 17 18 L 27 8" stroke="#09c0dd" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="17" font-size="12" font-weight="500" fill="#b8f0f9">amd64 · arm64</text>
    </g>

    <g transform="translate(630, 226)">
      <rect width="80" height="26" rx="6" fill="#09c0dd" fill-opacity="0.14" stroke="#09c0dd" stroke-opacity="0.45"/>
      <path d="M 12 13 L 17 18 L 27 8" stroke="#09c0dd" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="17" font-size="12" font-weight="500" fill="#b8f0f9">amd64</text>
    </g>
  </g>
</svg>
