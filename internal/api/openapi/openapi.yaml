openapi: 3.1.0
info:
  title: Dockmesh API
  summary: Container management platform — HTTP API
  description: |
    REST API for Dockmesh. All endpoints are versioned under `/api/v1`.

    ## Authentication

    Two bearer-token flavours are accepted on the `Authorization` header:

    - **User JWTs** — obtained via `POST /auth/login`, short-lived (15 min),
      refreshable via `POST /auth/refresh`. Use for interactive UI / CLI sessions.
    - **API tokens** — prefix `dmt_`, long-lived, created under
      Settings → API Tokens. Use for CI, scripts, external integrations.

    Both share the same permission model — a token's role dictates what it can do.

    ## Versioning

    Version `v1` is stable in the sense that we don't remove fields or change
    response shapes without warning. New fields may be added at any time, so
    clients should ignore unknown fields gracefully.

    ## Errors

    Non-2xx responses use a uniform shape: `{"error": "<human-readable message>"}`.
    HTTP status carries the category (400/401/403/404/409/500).

    ## Maintenance

    This spec is hand-maintained. `TestOpenAPIDriftAgainstRoutes` compares the
    registered chi routes against the operations declared here and fails CI on
    mismatch — so every PR that touches a route must also touch this file.
  version: "1.0.0"
  license:
    name: AGPL-3.0-or-later
    url: https://www.gnu.org/licenses/agpl-3.0.html
  contact:
    name: Dockmesh
    url: https://dockmesh.dev

servers:
  - url: /api/v1
    description: Relative path — served by the same process that renders the UI.

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Login, logout, refresh, MFA, OIDC redirects.
  - name: health
    description: Liveness + readiness.
  - name: users
    description: Local-user CRUD, scope-tag assignment, password reset.
  - name: roles
    description: Custom role definitions and permission grants.
  - name: oidc
    description: OpenID Connect provider configuration.
  - name: api-tokens
    description: Long-lived bearer tokens for CI / scripts.
  - name: hosts
    description: Local daemon + remote agents (read-only host inventory).
  - name: host-tags
    description: Free-form host tagging used for RBAC + scope filtering.
  - name: agents
    description: Remote-agent enrollment and revocation.
  - name: containers
    description: Docker container lifecycle — list, inspect, start/stop/restart/pause/kill, logs, stats, exec.
  - name: stacks
    description: Compose-stack CRUD and deploy/stop/status.
  - name: images
    description: Image list, pull (with registry-auth), remove, prune.
  - name: volumes
    description: Volume CRUD, prune, content browse (P.11.8).
  - name: networks
    description: Network list and inspect.
  - name: registries
    description: Stored registry credentials (P.11.7), test-login.
  - name: backups
    description: Backup jobs, runs, targets, scheduling.
  - name: alerts
    description: Alert rules, channels, history.
  - name: audit
    description: Tamper-evident audit log readout.
  - name: metrics
    description: Historical per-container metrics + the Prometheus /metrics endpoint.
  - name: settings
    description: Server-wide runtime settings (DB-backed).
  - name: global-env
    description: Shared environment variables available to all stacks.
  - name: migrations
    description: Cross-host stack migration + drain (P.9 / P.10).
  - name: proxy
    description: Embedded Caddy reverse-proxy configuration.
  - name: secrets
    description: age-encrypted secrets service state.

paths:
  # -----------------------------------------------------------------------
  # auth — session flow, MFA, OIDC redirects
  # -----------------------------------------------------------------------
  /auth/login:
    post:
      operationId: auth.login
      tags: [auth]
      summary: Log in with username + password
      description: |
        Exchanges a username + password for a session. If the user has MFA
        enabled, the response contains `mfa_required: true` and an
        `mfa_token` — clients must then call `POST /auth/mfa` with the
        token plus the 6-digit code to finish the login.

        Rate-limited per source IP — 10 failures / minute, 5 min lockout
        after that threshold. A 429 response includes `Retry-After`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, example: admin }
                password: { type: string, format: password }
      responses:
        "200":
          description: Login succeeded. For MFA users, `mfa_required=true` and the client must complete `/auth/mfa`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429":
          description: Too many failed attempts — try again later.
          headers:
            Retry-After:
              schema: { type: integer }
              description: Seconds until lockout expires.

  /auth/logout:
    post:
      operationId: auth.logout
      tags: [auth]
      summary: Invalidate a refresh token
      description: Revokes the refresh token's entire session family. Idempotent.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        "204": { description: Logged out. }

  /auth/refresh:
    post:
      operationId: auth.refresh
      tags: [auth]
      summary: Rotate an access token
      description: |
        Exchanges a refresh token for a fresh access+refresh pair. Refresh
        tokens are rotated on every use. Reusing a previously-rotated token
        revokes the whole session family.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: New token pair.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Invalid, expired, or reused refresh token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/mfa:
    post:
      operationId: auth.login_mfa
      tags: [auth]
      summary: Complete a two-factor login
      description: |
        Second step of the login flow when the user has MFA enabled.
        Accepts a 6-digit TOTP code or a recovery code.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfa_token, code]
              properties:
                mfa_token:
                  type: string
                  description: Short-lived token issued by `/auth/login` when MFA is required.
                code:
                  type: string
                  description: 6-digit TOTP or a recovery code.
                  example: "123456"
      responses:
        "200":
          description: MFA succeeded — session issued.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Invalid or expired MFA token / code.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/oidc/providers:
    get:
      operationId: auth.oidc_providers
      tags: [auth]
      summary: List SSO providers available on the login screen
      description: Public — used by the login page to render SSO buttons.
      security: []
      responses:
        "200":
          description: Enabled OIDC providers.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [slug, display_name]
                  properties:
                    slug: { type: string, example: google }
                    display_name: { type: string, example: Sign in with Google }

  /auth/oidc/{slug}/login:
    get:
      operationId: auth.oidc_login
      tags: [auth]
      summary: Start an OIDC authorization flow
      description: Redirects to the provider's authorization URL with a signed state cookie.
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "302":
          description: Redirect to provider.
          headers:
            Location:
              schema: { type: string, format: uri }
        "503":
          description: OIDC is not configured.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/oidc/{slug}/callback:
    get:
      operationId: auth.oidc_callback
      tags: [auth]
      summary: Consume the OIDC callback and mint a Dockmesh session
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
      responses:
        "302":
          description: Redirect to the UI with the session token fragment.
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: State mismatch or code exchange failed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /mfa/enroll/start:
    post:
      operationId: auth.mfa_enroll_start
      tags: [auth]
      summary: Begin TOTP enrollment for the current user
      description: |
        Generates a fresh TOTP secret and returns the QR URL. The secret is
        NOT active until `/mfa/enroll/verify` succeeds.
      responses:
        "200":
          description: Enrollment in progress.
          content:
            application/json:
              schema:
                type: object
                required: [secret, otpauth_url]
                properties:
                  secret: { type: string, description: Base32-encoded TOTP secret. }
                  otpauth_url: { type: string, format: uri }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409":
          description: MFA already enrolled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /mfa/enroll/verify:
    post:
      operationId: auth.mfa_enroll_verify
      tags: [auth]
      summary: Finalise TOTP enrollment and reveal recovery codes
      description: |
        Validates the first 6-digit code. On success, activates MFA and
        returns single-use recovery codes — shown ONCE.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, example: "123456" }
      responses:
        "200":
          description: MFA active. Recovery codes shown once only.
          content:
            application/json:
              schema:
                type: object
                required: [recovery_codes]
                properties:
                  recovery_codes:
                    type: array
                    items: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Invalid code.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Already verified.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /mfa:
    delete:
      operationId: auth.mfa_disable
      tags: [auth]
      summary: Disable MFA for the current user
      responses:
        "204": { description: MFA disabled. }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # -----------------------------------------------------------------------
  # hosts — inventory of the local daemon + registered agents
  # -----------------------------------------------------------------------
  /hosts:
    get:
      operationId: hosts.list
      tags: [hosts]
      summary: List all hosts visible to the caller
      description: |
        Returns the local docker daemon plus every registered agent (online
        or offline), decorated with host tags. Scoped users (P.11.3) see
        only hosts whose tags match their scope.
      responses:
        "200":
          description: Host list.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/HostInfo" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # -----------------------------------------------------------------------
  # host-tags — free-form host tagging
  # -----------------------------------------------------------------------
  /hosts/tags/all:
    get:
      operationId: host_tags.all
      tags: [host-tags]
      summary: Global distinct set of tags across all hosts
      description: Used by the UI chip-input to autocomplete existing tags.
      responses:
        "200":
          description: Tag list.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /hosts/{id}/tags:
    parameters:
      - $ref: "#/components/parameters/HostIDPath"
    get:
      operationId: host_tags.list
      tags: [host-tags]
      summary: Tags assigned to one host
      responses:
        "200":
          description: Tags.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      operationId: host_tags.set
      tags: [host-tags]
      summary: Replace the full tag list for a host
      description: |
        Canonicalises the input (lowercase, dedupes) and validates the
        `[a-z0-9][a-z0-9-]{0,31}` per-tag syntax. Max 20 tags per host.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tags]
              properties:
                tags:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: The canonicalised tag list that was stored.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description: Too many tags (max 20).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      operationId: host_tags.add
      tags: [host-tags]
      summary: Add a single tag to a host
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tag]
              properties:
                tag: { type: string, example: prod }
      responses:
        "200":
          description: Updated tag list.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /hosts/{id}/tags/{tag}:
    delete:
      operationId: host_tags.remove
      tags: [host-tags]
      summary: Remove one tag from a host
      parameters:
        - $ref: "#/components/parameters/HostIDPath"
        - name: tag
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Removed. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # -----------------------------------------------------------------------
  # agents — remote-host lifecycle (enroll, list, revoke, self-upgrade)
  # -----------------------------------------------------------------------
  /agents:
    get:
      operationId: agents.list
      tags: [agents]
      summary: List all registered remote agents
      responses:
        "200":
          description: Agents.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Agent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: agents.create
      tags: [agents]
      summary: Register a new agent and issue a one-time install token
      description: |
        Allocates the agent row in `pending` state and returns a one-time
        enrollment token the admin pastes into the agent host's install
        command. The plaintext token is shown ONCE — lose it and you
        revoke + recreate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: prod-01 }
      responses:
        "201":
          description: Agent registered; install hint returned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentCreateResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Name already taken.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /agents/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: agents.get
      tags: [agents]
      summary: Inspect one agent
      responses:
        "200":
          description: Agent.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: agents.delete
      tags: [agents]
      summary: Revoke an agent
      description: |
        Removes the DB row. The agent's client cert is no longer recognised
        by the mTLS listener on the next reconnect. Host tags are dropped
        automatically.
      responses:
        "204": { description: Revoked. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /agents/{id}/upgrade:
    post:
      operationId: agents.upgrade
      tags: [agents]
      summary: Trigger a self-upgrade on a connected agent
      description: |
        The agent downloads a fresh `dockmesh-agent-linux-<arch>` binary
        from the server's `/install/` path and restarts its systemd unit.
        Agent must be currently connected.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Upgrade dispatched.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: upgrading }
                  version: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503":
          description: Agent is not currently connected.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /agents/enroll:
    post:
      operationId: agents.enroll
      tags: [agents]
      summary: "Public: swap a one-time token for an agent client cert"
      description: |
        Called by the agent binary on first boot. There is NO Bearer auth
        on this route — the one-time token IS the authentication.
        Returns the freshly-signed client cert, key, CA cert, and the
        wss URL the agent should dial.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentEnrollRequest" }
      responses:
        "200":
          description: Enrollment successful — cert issued.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentEnrollResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Invalid or already-used token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "JWT or dmt_<40-char-base64url>"
      description: |
        Accepts either a user session JWT (from `POST /auth/login`) or an API
        token (prefix `dmt_`, from Settings → API Tokens). The route layer
        checks role permissions after authentication.

  # Schemas used across multiple groups live here. Group-specific schemas
  # live inline under the operation to keep the spec readable when new
  # groups get added.
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid credentials

    Empty:
      type: object
      description: Empty body — use for 204 No Content endpoints.

    User:
      type: object
      required: [id, username, role, mfa_enabled]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        email: { type: string, format: email }
        role: { type: string, example: operator }
        scope_tags:
          type: array
          items: { type: string }
          description: Host tags this user is scoped to. Empty / omitted = access to all hosts.
        mfa_enabled: { type: boolean }

    HostInfo:
      type: object
      required: [id, name, kind, status]
      properties:
        id:
          type: string
          description: '"local" for the central daemon, otherwise an agent UUID.'
        name: { type: string }
        kind:
          type: string
          enum: [local, agent]
        status:
          type: string
          enum: [online, offline, pending, revoked]
        tags:
          type: array
          items: { type: string }

    Agent:
      type: object
      required: [id, name, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status:
          type: string
          enum: [pending, online, offline, revoked]
        version: { type: string }
        os: { type: string }
        arch: { type: string }
        hostname: { type: string }
        docker_version: { type: string }
        cert_fingerprint: { type: string }
        last_seen_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AgentCreateResult:
      type: object
      required: [agent, token, install_hint]
      description: |
        Returned ONCE on agent creation. `token` is shown only here —
        losing it means you have to delete and recreate the agent.
      properties:
        agent: { $ref: "#/components/schemas/Agent" }
        token:
          type: string
          description: One-time enrollment token. Paste into the install command on the agent host.
        enroll_url:
          type: string
          format: uri
        agent_url:
          type: string
          description: wss:// URL the agent will dial after enrollment.
        install_hint:
          type: string
          description: Single-line install command to run on the agent host as root.

    AgentEnrollRequest:
      type: object
      required: [token, hostname, os, arch, version]
      properties:
        token: { type: string }
        hostname: { type: string }
        os: { type: string, example: linux }
        arch: { type: string, example: amd64 }
        version: { type: string }
        docker_version: { type: string }

    AgentEnrollResponse:
      type: object
      required: [agent_id, agent_name, client_cert, client_key, ca_cert, agent_url]
      properties:
        agent_id: { type: string, format: uuid }
        agent_name: { type: string }
        client_cert: { type: string, description: PEM-encoded client cert. }
        client_key: { type: string, description: PEM-encoded private key (shown once). }
        ca_cert: { type: string, description: PEM-encoded CA cert the agent should pin. }
        agent_url: { type: string, description: wss:// URL the agent should dial. }

    LoginResult:
      type: object
      description: |
        Either a fresh session (access+refresh+user) or an MFA challenge
        (`mfa_required: true` + `mfa_token`) that clients must complete via
        `POST /auth/mfa` before getting a session.
      properties:
        access_token:
          type: string
          description: "15-minute-TTL JWT. Send as `Authorization: Bearer <token>`."
        refresh_token:
          type: string
          description: "Opaque token for `/auth/refresh`. Rotates on every use."
        user:
          $ref: "#/components/schemas/User"
        mfa_required:
          type: boolean
          description: "True when the user has MFA enabled — use `mfa_token` with `/auth/mfa`."
        mfa_token:
          type: string
          description: "Short-lived challenge token for the `/auth/mfa` completion."

  parameters:
    HostQuery:
      name: host
      in: query
      description: "Target host id. Empty or `local` = central server's daemon; otherwise an agent UUID. `all` fans out to every online host."
      required: false
      schema:
        type: string
        default: local
    HostIDPath:
      name: id
      in: path
      description: Host id — "local" for the central daemon, otherwise an agent UUID.
      required: true
      schema:
        type: string

  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated but the token's role lacks the required permission.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Malformed request body or invalid parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: The operation conflicts with existing state (e.g. duplicate name, built-in rule deletion).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
