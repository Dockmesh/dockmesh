openapi: 3.1.0
info:
  title: Dockmesh API
  summary: Container management platform — HTTP API
  description: |
    REST API for Dockmesh. All endpoints are versioned under `/api/v1`.

    ## Authentication

    Two bearer-token flavours are accepted on the `Authorization` header:

    - **User JWTs** — obtained via `POST /auth/login`, short-lived (15 min),
      refreshable via `POST /auth/refresh`. Use for interactive UI / CLI sessions.
    - **API tokens** — prefix `dmt_`, long-lived, created under
      Settings → API Tokens. Use for CI, scripts, external integrations.

    Both share the same permission model — a token's role dictates what it can do.

    ## Versioning

    Version `v1` is stable in the sense that we don't remove fields or change
    response shapes without warning. New fields may be added at any time, so
    clients should ignore unknown fields gracefully.

    ## Errors

    Non-2xx responses use a uniform shape: `{"error": "<human-readable message>"}`.
    HTTP status carries the category (400/401/403/404/409/500).

    ## Maintenance

    This spec is hand-maintained. `TestOpenAPIDriftAgainstRoutes` compares the
    registered chi routes against the operations declared here and fails CI on
    mismatch — so every PR that touches a route must also touch this file.
  version: "1.0.0"
  license:
    name: AGPL-3.0-or-later
    url: https://www.gnu.org/licenses/agpl-3.0.html
  contact:
    name: Dockmesh
    url: https://dockmesh.dev

servers:
  - url: /api/v1
    description: Relative path — served by the same process that renders the UI.

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Login, logout, refresh, MFA, OIDC redirects.
  - name: health
    description: Liveness + readiness.
  - name: users
    description: Local-user CRUD, scope-tag assignment, password reset.
  - name: roles
    description: Custom role definitions and permission grants.
  - name: oidc
    description: OpenID Connect provider configuration.
  - name: api-tokens
    description: Long-lived bearer tokens for CI / scripts.
  - name: hosts
    description: Local daemon + remote agents (read-only host inventory).
  - name: host-tags
    description: Free-form host tagging used for RBAC + scope filtering.
  - name: agents
    description: Remote-agent enrollment and revocation.
  - name: containers
    description: Docker container lifecycle — list, inspect, start/stop/restart/pause/kill, logs, stats, exec.
  - name: stacks
    description: Compose-stack CRUD and deploy/stop/status.
  - name: images
    description: Image list, pull (with registry-auth), remove, prune.
  - name: volumes
    description: Volume CRUD, prune, content browse (P.11.8).
  - name: networks
    description: Network list and inspect.
  - name: registries
    description: Stored registry credentials (P.11.7), test-login.
  - name: backups
    description: Backup jobs, runs, targets, scheduling.
  - name: alerts
    description: Alert rules, channels, history.
  - name: audit
    description: Tamper-evident audit log readout.
  - name: metrics
    description: Historical per-container metrics + the Prometheus /metrics endpoint.
  - name: settings
    description: Server-wide runtime settings (DB-backed).
  - name: global-env
    description: Shared environment variables available to all stacks.
  - name: migrations
    description: Cross-host stack migration + drain (P.9 / P.10).
  - name: proxy
    description: Embedded Caddy reverse-proxy configuration.
  - name: secrets
    description: age-encrypted secrets service state.

paths:
  # -----------------------------------------------------------------------
  # auth — session flow, MFA, OIDC redirects
  # -----------------------------------------------------------------------
  /auth/login:
    post:
      operationId: auth.login
      tags: [auth]
      summary: Log in with username + password
      description: |
        Exchanges a username + password for a session. If the user has MFA
        enabled, the response contains `mfa_required: true` and an
        `mfa_token` — clients must then call `POST /auth/mfa` with the
        token plus the 6-digit code to finish the login.

        Rate-limited per source IP — 10 failures / minute, 5 min lockout
        after that threshold. A 429 response includes `Retry-After`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, example: admin }
                password: { type: string, format: password }
      responses:
        "200":
          description: Login succeeded. For MFA users, `mfa_required=true` and the client must complete `/auth/mfa`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429":
          description: Too many failed attempts — try again later.
          headers:
            Retry-After:
              schema: { type: integer }
              description: Seconds until lockout expires.

  /auth/logout:
    post:
      operationId: auth.logout
      tags: [auth]
      summary: Invalidate a refresh token
      description: Revokes the refresh token's entire session family. Idempotent.
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        "204": { description: Logged out. }

  /auth/refresh:
    post:
      operationId: auth.refresh
      tags: [auth]
      summary: Rotate an access token
      description: |
        Exchanges a refresh token for a fresh access+refresh pair. Refresh
        tokens are rotated on every use. Reusing a previously-rotated token
        revokes the whole session family.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: New token pair.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Invalid, expired, or reused refresh token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/mfa:
    post:
      operationId: auth.login_mfa
      tags: [auth]
      summary: Complete a two-factor login
      description: |
        Second step of the login flow when the user has MFA enabled.
        Accepts a 6-digit TOTP code or a recovery code.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mfa_token, code]
              properties:
                mfa_token:
                  type: string
                  description: Short-lived token issued by `/auth/login` when MFA is required.
                code:
                  type: string
                  description: 6-digit TOTP or a recovery code.
                  example: "123456"
      responses:
        "200":
          description: MFA succeeded — session issued.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Invalid or expired MFA token / code.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/oidc/providers:
    get:
      operationId: auth.oidc_providers
      tags: [auth]
      summary: List SSO providers available on the login screen
      description: Public — used by the login page to render SSO buttons.
      security: []
      responses:
        "200":
          description: Enabled OIDC providers.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [slug, display_name]
                  properties:
                    slug: { type: string, example: google }
                    display_name: { type: string, example: Sign in with Google }

  /auth/oidc/{slug}/login:
    get:
      operationId: auth.oidc_login
      tags: [auth]
      summary: Start an OIDC authorization flow
      description: Redirects to the provider's authorization URL with a signed state cookie.
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "302":
          description: Redirect to provider.
          headers:
            Location:
              schema: { type: string, format: uri }
        "503":
          description: OIDC is not configured.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /auth/oidc/{slug}/callback:
    get:
      operationId: auth.oidc_callback
      tags: [auth]
      summary: Consume the OIDC callback and mint a Dockmesh session
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
      responses:
        "302":
          description: Redirect to the UI with the session token fragment.
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: State mismatch or code exchange failed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /mfa/enroll/start:
    post:
      operationId: auth.mfa_enroll_start
      tags: [auth]
      summary: Begin TOTP enrollment for the current user
      description: |
        Generates a fresh TOTP secret and returns the QR URL. The secret is
        NOT active until `/mfa/enroll/verify` succeeds.
      responses:
        "200":
          description: Enrollment in progress.
          content:
            application/json:
              schema:
                type: object
                required: [secret, otpauth_url]
                properties:
                  secret: { type: string, description: Base32-encoded TOTP secret. }
                  otpauth_url: { type: string, format: uri }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409":
          description: MFA already enrolled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /mfa/enroll/verify:
    post:
      operationId: auth.mfa_enroll_verify
      tags: [auth]
      summary: Finalise TOTP enrollment and reveal recovery codes
      description: |
        Validates the first 6-digit code. On success, activates MFA and
        returns single-use recovery codes — shown ONCE.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, example: "123456" }
      responses:
        "200":
          description: MFA active. Recovery codes shown once only.
          content:
            application/json:
              schema:
                type: object
                required: [recovery_codes]
                properties:
                  recovery_codes:
                    type: array
                    items: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Invalid code.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "409":
          description: Already verified.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /mfa:
    delete:
      operationId: auth.mfa_disable
      tags: [auth]
      summary: Disable MFA for the current user
      responses:
        "204": { description: MFA disabled. }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # -----------------------------------------------------------------------
  # hosts — inventory of the local daemon + registered agents
  # -----------------------------------------------------------------------
  /hosts:
    get:
      operationId: hosts.list
      tags: [hosts]
      summary: List all hosts visible to the caller
      description: |
        Returns the local docker daemon plus every registered agent (online
        or offline), decorated with host tags. Scoped users (P.11.3) see
        only hosts whose tags match their scope.
      responses:
        "200":
          description: Host list.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/HostInfo" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # -----------------------------------------------------------------------
  # host-tags — free-form host tagging
  # -----------------------------------------------------------------------
  /hosts/tags/all:
    get:
      operationId: host_tags.all
      tags: [host-tags]
      summary: Global distinct set of tags across all hosts
      description: Used by the UI chip-input to autocomplete existing tags.
      responses:
        "200":
          description: Tag list.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /hosts/{id}/tags:
    parameters:
      - $ref: "#/components/parameters/HostIDPath"
    get:
      operationId: host_tags.list
      tags: [host-tags]
      summary: Tags assigned to one host
      responses:
        "200":
          description: Tags.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      operationId: host_tags.set
      tags: [host-tags]
      summary: Replace the full tag list for a host
      description: |
        Canonicalises the input (lowercase, dedupes) and validates the
        `[a-z0-9][a-z0-9-]{0,31}` per-tag syntax. Max 20 tags per host.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tags]
              properties:
                tags:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: The canonicalised tag list that was stored.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422":
          description: Too many tags (max 20).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    post:
      operationId: host_tags.add
      tags: [host-tags]
      summary: Add a single tag to a host
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tag]
              properties:
                tag: { type: string, example: prod }
      responses:
        "200":
          description: Updated tag list.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /hosts/{id}/tags/{tag}:
    delete:
      operationId: host_tags.remove
      tags: [host-tags]
      summary: Remove one tag from a host
      parameters:
        - $ref: "#/components/parameters/HostIDPath"
        - name: tag
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: Removed. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # -----------------------------------------------------------------------
  # agents — remote-host lifecycle (enroll, list, revoke, self-upgrade)
  # -----------------------------------------------------------------------
  /agents:
    get:
      operationId: agents.list
      tags: [agents]
      summary: List all registered remote agents
      responses:
        "200":
          description: Agents.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Agent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: agents.create
      tags: [agents]
      summary: Register a new agent and issue a one-time install token
      description: |
        Allocates the agent row in `pending` state and returns a one-time
        enrollment token the admin pastes into the agent host's install
        command. The plaintext token is shown ONCE — lose it and you
        revoke + recreate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: prod-01 }
      responses:
        "201":
          description: Agent registered; install hint returned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentCreateResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Name already taken.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /agents/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: agents.get
      tags: [agents]
      summary: Inspect one agent
      responses:
        "200":
          description: Agent.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: agents.delete
      tags: [agents]
      summary: Revoke an agent
      description: |
        Removes the DB row. The agent's client cert is no longer recognised
        by the mTLS listener on the next reconnect. Host tags are dropped
        automatically.
      responses:
        "204": { description: Revoked. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /agents/{id}/upgrade:
    post:
      operationId: agents.upgrade
      tags: [agents]
      summary: Trigger a self-upgrade on a connected agent
      description: |
        The agent downloads a fresh `dockmesh-agent-linux-<arch>` binary
        from the server's `/install/` path and restarts its systemd unit.
        Agent must be currently connected.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Upgrade dispatched.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: upgrading }
                  version: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503":
          description: Agent is not currently connected.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /agents/enroll:
    post:
      operationId: agents.enroll
      tags: [agents]
      summary: "Public: swap a one-time token for an agent client cert"
      description: |
        Called by the agent binary on first boot. There is NO Bearer auth
        on this route — the one-time token IS the authentication.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentEnrollRequest" }
      responses:
        "200":
          description: Enrollment successful — cert issued.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentEnrollResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401":
          description: Invalid or already-used token.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # -----------------------------------------------------------------------
  # containers — lifecycle, logs, stats, exec (WS endpoints live separately)
  # -----------------------------------------------------------------------
  /containers:
    get:
      operationId: containers.list
      tags: [containers]
      summary: List containers across one or all hosts
      description: |
        Fan-out capable via `?host=all`. Each row is a Docker SDK
        `Container` summary plus `host_id` / `host_name` when fanning out.
      parameters:
        - $ref: "#/components/parameters/HostQuery"
        - name: all
          in: query
          schema: { type: boolean, default: false }
          description: Include stopped containers.
      responses:
        "200":
          description: Container list. Shape differs between single-host (array) and fan-out (FanOutResponse).
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items: { $ref: "#/components/schemas/Container" }
                  - $ref: "#/components/schemas/FanOutResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503":
          description: Docker daemon is unreachable on the target host.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /containers/{id}:
    parameters:
      - $ref: "#/components/parameters/ContainerIDPath"
      - $ref: "#/components/parameters/HostQuery"
    get:
      operationId: containers.inspect
      tags: [containers]
      summary: Inspect one container
      responses:
        "200":
          description: Full ContainerJSON from the Docker daemon.
          content:
            application/json:
              schema: { type: object, description: Passthrough of the Docker SDK ContainerJSON. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: containers.remove
      tags: [containers]
      summary: Remove a container
      parameters:
        - name: force
          in: query
          schema: { type: boolean, default: false }
          description: Kill running containers before removing.
      responses:
        "204": { description: Removed. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /containers/{id}/start:
    post:
      operationId: containers.start
      tags: [containers]
      summary: Start a container
      parameters:
        - $ref: "#/components/parameters/ContainerIDPath"
        - $ref: "#/components/parameters/HostQuery"
      responses:
        "204": { description: Started. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /containers/{id}/stop:
    post:
      operationId: containers.stop
      tags: [containers]
      summary: Stop a container (SIGTERM, then SIGKILL after timeout)
      parameters:
        - $ref: "#/components/parameters/ContainerIDPath"
        - $ref: "#/components/parameters/HostQuery"
      responses:
        "204": { description: Stopped. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /containers/{id}/restart:
    post:
      operationId: containers.restart
      tags: [containers]
      summary: Restart a container
      parameters:
        - $ref: "#/components/parameters/ContainerIDPath"
        - $ref: "#/components/parameters/HostQuery"
      responses:
        "204": { description: Restarted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /containers/{id}/pause:
    post:
      operationId: containers.pause
      tags: [containers]
      summary: Freeze all processes via the cgroup freezer
      description: |
        Pauses the container without losing state — useful for incident
        inspection. Unpause with `/containers/{id}/unpause`. P.11.4.
      parameters:
        - $ref: "#/components/parameters/ContainerIDPath"
        - $ref: "#/components/parameters/HostQuery"
      responses:
        "204": { description: Paused. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /containers/{id}/unpause:
    post:
      operationId: containers.unpause
      tags: [containers]
      summary: Resume a paused container
      parameters:
        - $ref: "#/components/parameters/ContainerIDPath"
        - $ref: "#/components/parameters/HostQuery"
      responses:
        "204": { description: Resumed. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /containers/{id}/kill:
    post:
      operationId: containers.kill
      tags: [containers]
      summary: Send a signal to a container
      description: |
        Default signal is SIGKILL. Accepts any signal name Docker accepts
        (SIGTERM, SIGHUP, SIGUSR1, …) in the request body. P.11.4.
      parameters:
        - $ref: "#/components/parameters/ContainerIDPath"
        - $ref: "#/components/parameters/HostQuery"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                signal: { type: string, example: SIGTERM, default: SIGKILL }
      responses:
        "204": { description: Signal sent. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /containers/{id}/update:
    post:
      operationId: containers.update
      tags: [containers]
      summary: Pull a newer image tag and recreate the container
      description: |
        Checks for a newer image matching the container's tag, pulls it,
        stops the old container, creates a new one with the same config,
        and starts it. Rollback history is retained for
        `/containers/{id}/rollback`.
      parameters:
        - $ref: "#/components/parameters/ContainerIDPath"
      responses:
        "200":
          description: Update complete.
          content:
            application/json:
              schema:
                type: object
                properties:
                  old_image: { type: string }
                  new_image: { type: string }
                  container_id: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /containers/{id}/rollback:
    post:
      operationId: containers.rollback
      tags: [containers]
      summary: Roll a container back to its previous image
      parameters:
        - $ref: "#/components/parameters/ContainerIDPath"
      responses:
        "200":
          description: Rolled back.
          content:
            application/json:
              schema:
                type: object
                properties:
                  image: { type: string }
                  container_id: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: No previous image to roll back to.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /containers/{id}/update-info:
    get:
      operationId: containers.update_info
      tags: [containers]
      summary: Check whether a newer image is available for this container
      parameters:
        - $ref: "#/components/parameters/ContainerIDPath"
      responses:
        "200":
          description: Update availability.
          content:
            application/json:
              schema:
                type: object
                properties:
                  update_available: { type: boolean }
                  current_image: { type: string }
                  latest_image: { type: string }
                  current_digest: { type: string }
                  latest_digest: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /containers/{id}/update-history:
    get:
      operationId: containers.update_history
      tags: [containers]
      summary: List prior image updates for this container
      parameters:
        - $ref: "#/components/parameters/ContainerIDPath"
      responses:
        "200":
          description: Update history entries, newest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer, format: int64 }
                    old_image: { type: string }
                    new_image: { type: string }
                    updated_at: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  # -----------------------------------------------------------------------
  # stacks — compose-file CRUD, deploy/stop, status, scaling, migration
  # -----------------------------------------------------------------------
  /stacks:
    get:
      operationId: stacks.list
      tags: [stacks]
      summary: List all stacks known to the filesystem
      description: Enriched with deployment info (host + status) when deployed.
      responses:
        "200":
          description: Stacks.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/StackListEntry" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: stacks.create
      tags: [stacks]
      summary: Create a new stack (compose.yaml + optional .env)
      description: |
        Writes the stack to the filesystem under `<stacks_root>/<name>/`.
        Name must match `[a-z0-9][a-z0-9-]*[a-z0-9]` (2..63 chars, not a
        reserved word). `.env` is encrypted at rest via the age key.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StackInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StackDetail" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: A stack with this name already exists.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /stacks/{name}:
    parameters:
      - $ref: "#/components/parameters/StackNamePath"
    get:
      operationId: stacks.get
      tags: [stacks]
      summary: Fetch compose.yaml + .env for one stack
      responses:
        "200":
          description: Detail.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StackDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: stacks.update
      tags: [stacks]
      summary: Update compose.yaml and/or .env for an existing stack
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StackInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StackDetail" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: stacks.delete
      tags: [stacks]
      summary: Remove a stack's files (does NOT stop running containers)
      description: |
        Call `/stacks/{name}/stop` first if the stack is deployed. Deleting
        the files while containers run orphans them — intentional, so
        operators can recover by `git pull` restoring the file tree.
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /stacks/{name}/deploy:
    post:
      operationId: stacks.deploy
      tags: [stacks]
      summary: Deploy a stack onto a target host
      description: |
        Ships the compose + env to the target host and runs `docker compose
        up -d` via the embedded compose executor. On a fresh deploy the
        deployment record is created; on an existing one, containers are
        updated in place.
      parameters:
        - $ref: "#/components/parameters/StackNamePath"
        - $ref: "#/components/parameters/HostQuery"
      responses:
        "200":
          description: Deploy result with created/updated/unchanged services.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeployResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: Compose validation failed — see message.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /stacks/{name}/stop:
    post:
      operationId: stacks.stop
      tags: [stacks]
      summary: Stop a deployed stack (docker compose down without -v)
      parameters:
        - $ref: "#/components/parameters/StackNamePath"
        - $ref: "#/components/parameters/HostQuery"
      responses:
        "204": { description: Stopped. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /stacks/{name}/status:
    get:
      operationId: stacks.status
      tags: [stacks]
      summary: Current per-service status on the deployed host
      parameters:
        - $ref: "#/components/parameters/StackNamePath"
        - $ref: "#/components/parameters/HostQuery"
      responses:
        "200":
          description: One row per service.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    service: { type: string }
                    container_id: { type: string }
                    state: { type: string, enum: [running, exited, paused, restarting, dead, created] }
                    status: { type: string }
                    image: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /stacks/{name}/scale:
    get:
      operationId: stacks.scale_overview
      tags: [stacks]
      summary: Replica count per service
      parameters:
        - $ref: "#/components/parameters/StackNamePath"
        - $ref: "#/components/parameters/HostQuery"
      responses:
        "200":
          description: Scale snapshot per service.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    service: { type: string }
                    replicas: { type: integer }
                    desired: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /stacks/{name}/services/{service}/scale:
    parameters:
      - $ref: "#/components/parameters/StackNamePath"
      - $ref: "#/components/parameters/ServicePath"
      - $ref: "#/components/parameters/HostQuery"
    get:
      operationId: stacks.scale_check
      tags: [stacks]
      summary: Pre-flight check before scaling a service
      description: Returns a list of blockers (container_name, hard ports, singleton volumes) that would prevent the scale, or an empty list if safe.
      responses:
        "200":
          description: Check result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  safe: { type: boolean }
                  blockers:
                    type: array
                    items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: stacks.scale_set
      tags: [stacks]
      summary: Scale a single service to N replicas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [replicas]
              properties:
                replicas: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Scale result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  service: { type: string }
                  replicas: { type: integer }
                  created: { type: array, items: { type: string } }
                  removed: { type: array, items: { type: string } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: Scale blocked by a safety check (singleton port/volume).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /stacks/{name}/scaling-rules:
    parameters:
      - $ref: "#/components/parameters/StackNamePath"
    get:
      operationId: stacks.scaling_rules_get
      tags: [stacks]
      summary: Auto-scaling rules configured for this stack (P.8)
      responses:
        "200":
          description: Rules.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ScalingRule" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: stacks.scaling_rules_set
      tags: [stacks]
      summary: Replace the auto-scaling rule set for this stack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rules]
              properties:
                rules:
                  type: array
                  items: { $ref: "#/components/schemas/ScalingRule" }
      responses:
        "200":
          description: Stored rules.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ScalingRule" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: stacks.scaling_rules_clear
      tags: [stacks]
      summary: Remove all auto-scaling rules for this stack
      responses:
        "204": { description: Cleared. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /stacks/{name}/migrate:
    post:
      operationId: stacks.migrate
      tags: [stacks, migrations]
      summary: Start a cross-host migration (P.9)
      description: |
        Snapshots volumes on the source host, ships them over the agent
        mTLS tunnel to the target host, deploys the stack there, and
        finally stops the source containers. The source files are kept
        for rollback until `/migrate/{id}/source` is called.
      parameters:
        - $ref: "#/components/parameters/StackNamePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_host_id]
              properties:
                target_host_id: { type: string, format: uuid }
                include_volumes: { type: boolean, default: true }
      responses:
        "202":
          description: Migration accepted — poll `/migrate/{id}` for progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  migration_id: { type: integer, format: int64 }
                  status: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /stacks/{name}/migrate/preflight:
    post:
      operationId: stacks.migrate_preflight
      tags: [stacks, migrations]
      summary: Dry-run migration check — returns blockers without starting
      parameters:
        - $ref: "#/components/parameters/StackNamePath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_host_id]
              properties:
                target_host_id: { type: string, format: uuid }
      responses:
        "200":
          description: Preflight result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  safe: { type: boolean }
                  blockers:
                    type: array
                    items: { type: string }
                  volumes:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        size_bytes: { type: integer, format: int64 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /stacks/{name}/migrate/{id}:
    parameters:
      - $ref: "#/components/parameters/StackNamePath"
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64 }
        description: Migration id returned by `/stacks/{name}/migrate`.
    get:
      operationId: stacks.migrate_status
      tags: [stacks, migrations]
      summary: Poll a running migration
      responses:
        "200":
          description: Current state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MigrationStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /stacks/{name}/migrate/{id}/rollback:
    post:
      operationId: stacks.migrate_rollback
      tags: [stacks, migrations]
      summary: Roll back a migration (restart source, drop target)
      parameters:
        - $ref: "#/components/parameters/StackNamePath"
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "200":
          description: Rolled back.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MigrationStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Migration in a state that cannot be rolled back.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /stacks/{name}/migrate/{id}/source:
    delete:
      operationId: stacks.migrate_finalize
      tags: [stacks, migrations]
      summary: Finalise a successful migration (remove source files + volumes)
      description: |
        Called by the operator once they've verified the target is healthy.
        Removes the source host's stack files and (optionally) volumes,
        giving up the rollback option.
      parameters:
        - $ref: "#/components/parameters/StackNamePath"
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        "204": { description: Source cleaned up. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # -----------------------------------------------------------------------
  # images — list, pull (with registry-auth), remove, prune, CVE scan
  # -----------------------------------------------------------------------
  /images:
    get:
      operationId: images.list
      tags: [images]
      summary: List images on one or all hosts
      parameters:
        - $ref: "#/components/parameters/HostQuery"
        - name: all
          in: query
          schema: { type: boolean, default: false }
          description: Include intermediate / dangling image layers.
      responses:
        "200":
          description: Image list (passthrough of Docker SDK ImageSummary plus host_id/host_name in fan-out mode).
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items: { type: object }
                  - $ref: "#/components/schemas/FanOutResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /images/pull:
    post:
      operationId: images.pull
      tags: [images]
      summary: Pull an image (streams progress as ndjson)
      description: |
        Streams Docker's pull-progress lines as `application/x-ndjson`.
        Registry credentials from Settings → Registries (P.11.7) are
        applied automatically based on the image reference. Only hits
        the central server's local daemon; agent-side pulls with creds
        are tracked as P.12.28.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image]
              properties:
                image: { type: string, example: "ghcr.io/foo/bar:tag" }
      responses:
        "200":
          description: Streaming ndjson of progress frames.
          content:
            application/x-ndjson:
              schema:
                type: string
                description: Newline-delimited JSON — one progress frame per line.
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503":
          description: Docker daemon unavailable.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /images/{id}:
    delete:
      operationId: images.remove
      tags: [images]
      summary: Remove an image
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: Image id or name:tag.
        - $ref: "#/components/parameters/HostQuery"
        - name: force
          in: query
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: List of layers / references deleted.
          content:
            application/json:
              schema:
                type: array
                items: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Image is in use by a container.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /images/prune:
    post:
      operationId: images.prune
      tags: [images]
      summary: Remove dangling images
      parameters:
        - $ref: "#/components/parameters/HostQuery"
      responses:
        "200":
          description: Prune report.
          content:
            application/json:
              schema:
                type: object
                properties:
                  space_reclaimed: { type: integer, format: int64 }
                  images_deleted:
                    type: array
                    items: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /images/{id}/scan:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
        description: Image id or name:tag.
    post:
      operationId: images.scan_start
      tags: [images]
      summary: Kick off a Grype vulnerability scan
      responses:
        "202":
          description: Scan queued — poll `GET /images/{id}/scan` for results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: queued }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503":
          description: Scanner is disabled (grype not installed).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    get:
      operationId: images.scan_result
      tags: [images]
      summary: Fetch the latest scan result for an image
      responses:
        "200":
          description: Scan summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  image: { type: string }
                  scanned_at: { type: string, format: date-time }
                  critical: { type: integer }
                  high: { type: integer }
                  medium: { type: integer }
                  low: { type: integer }
                  negligible: { type: integer }
                  vulnerabilities:
                    type: array
                    items: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: No scan has been run for this image.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # -----------------------------------------------------------------------
  # volumes — CRUD + prune + content browse (P.11.8)
  # -----------------------------------------------------------------------
  /volumes:
    get:
      operationId: volumes.list
      tags: [volumes]
      summary: List volumes (fan-out capable)
      parameters:
        - $ref: "#/components/parameters/HostQuery"
      responses:
        "200":
          description: Volume list.
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items: { type: object }
                  - $ref: "#/components/schemas/FanOutResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: volumes.create
      tags: [volumes]
      summary: Create a volume on the central daemon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                driver: { type: string, default: local }
                labels:
                  type: object
                  additionalProperties: { type: string }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /volumes/prune:
    post:
      operationId: volumes.prune
      tags: [volumes]
      summary: Remove unused volumes
      responses:
        "200":
          description: Prune report.
          content:
            application/json:
              schema:
                type: object
                properties:
                  space_reclaimed: { type: integer, format: int64 }
                  volumes_deleted:
                    type: array
                    items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /volumes/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string }
      - $ref: "#/components/parameters/HostQuery"
    get:
      operationId: volumes.inspect
      tags: [volumes]
      summary: Inspect one volume
      responses:
        "200":
          description: Volume.
          content:
            application/json:
              schema: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: volumes.remove
      tags: [volumes]
      summary: Remove a volume (must be unused unless forced)
      parameters:
        - name: force
          in: query
          schema: { type: boolean, default: false }
      responses:
        "204": { description: Removed. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Volume is in use.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /volumes/{name}/browse:
    get:
      operationId: volumes.browse
      tags: [volumes]
      summary: List one directory level inside a volume (P.11.8)
      description: Admin-only; every call is audited. Read-only.
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/HostQuery"
        - name: path
          in: query
          schema: { type: string, default: "/" }
          description: Path relative to the volume root.
      responses:
        "200":
          description: Directory entries.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/VolumeEntry" }
        "400":
          description: Path escapes volume root or is too long.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Volume driver doesn't expose a host-filesystem mountpoint.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /volumes/{name}/browse/file:
    get:
      operationId: volumes.browse_file
      tags: [volumes]
      summary: Read a single file inside a volume, capped at 1 MiB (P.11.8)
      description: |
        Returns up to 1 MiB of content. `truncated: true` signals the file
        is larger — the UI then offers a download link instead of an inline
        preview. `binary: true` is set when a NUL byte is found in the
        first 8 KiB (same heuristic git uses).
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
        - $ref: "#/components/parameters/HostQuery"
        - name: path
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: File content.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VolumeFileResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # -----------------------------------------------------------------------
  # networks — CRUD + topology view + prune
  # -----------------------------------------------------------------------
  /networks:
    get:
      operationId: networks.list
      tags: [networks]
      summary: List networks (fan-out capable)
      parameters:
        - $ref: "#/components/parameters/HostQuery"
      responses:
        "200":
          description: Networks.
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items: { type: object }
                  - $ref: "#/components/schemas/FanOutResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: networks.create
      tags: [networks]
      summary: Create a network on the central daemon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                driver: { type: string, default: bridge }
                labels:
                  type: object
                  additionalProperties: { type: string }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { type: object }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /networks/prune:
    post:
      operationId: networks.prune
      tags: [networks]
      summary: Remove unused networks
      responses:
        "200":
          description: Prune report.
          content:
            application/json:
              schema:
                type: object
                properties:
                  networks_deleted:
                    type: array
                    items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /networks/topology:
    get:
      operationId: networks.topology
      tags: [networks]
      summary: Network → containers graph for the topology view
      parameters:
        - $ref: "#/components/parameters/HostQuery"
      responses:
        "200":
          description: Nodes + edges ready for the d3 force graph.
          content:
            application/json:
              schema:
                type: object
                properties:
                  networks:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        name: { type: string }
                        driver: { type: string }
                        containers:
                          type: array
                          items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /networks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
      - $ref: "#/components/parameters/HostQuery"
    get:
      operationId: networks.inspect
      tags: [networks]
      summary: Inspect one network
      responses:
        "200":
          description: Network.
          content:
            application/json:
              schema: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: networks.remove
      tags: [networks]
      summary: Remove a network
      responses:
        "204": { description: Removed. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Network still has active endpoints.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # -----------------------------------------------------------------------
  # backups — jobs, runs, targets (P.3.4)
  # -----------------------------------------------------------------------
  /backups/jobs:
    get:
      operationId: backups.list_jobs
      tags: [backups]
      summary: List all backup jobs
      responses:
        "200":
          description: Jobs.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BackupJob" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: backups.create_job
      tags: [backups]
      summary: Create a new backup job
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BackupJobInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupJob" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /backups/jobs/{id}:
    parameters:
      - $ref: "#/components/parameters/IntIDPath"
    get:
      operationId: backups.get_job
      tags: [backups]
      summary: Inspect one backup job
      responses:
        "200":
          description: Job.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupJob" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: backups.update_job
      tags: [backups]
      summary: Update a backup job
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BackupJobInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupJob" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: backups.delete_job
      tags: [backups]
      summary: Delete a backup job (does not delete existing runs)
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /backups/jobs/{id}/run:
    post:
      operationId: backups.run_job
      tags: [backups]
      summary: Trigger a job to run immediately
      parameters:
        - $ref: "#/components/parameters/IntIDPath"
      responses:
        "202":
          description: Run queued — poll `/backups/runs` for progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { type: integer, format: int64 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Job is already running.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /backups/runs:
    get:
      operationId: backups.list_runs
      tags: [backups]
      summary: Recent backup runs, newest first
      parameters:
        - name: job_id
          in: query
          schema: { type: integer, format: int64 }
          description: Optional filter to one job's runs.
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        "200":
          description: Runs.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BackupRun" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /backups/runs/{id}/restore:
    post:
      operationId: backups.restore_run
      tags: [backups]
      summary: Restore a specific backup run onto a target
      description: |
        For volume/stack backups this extracts the tar into a fresh volume
        or stack directory; for system backups it writes the snapshot DB
        + stacks tree to a specified path for the operator to swap in.
      parameters:
        - $ref: "#/components/parameters/IntIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host_id: { type: string }
                target_volume: { type: string }
                target_stack: { type: string }
                target_path: { type: string, description: "For system backups — filesystem destination." }
      responses:
        "200":
          description: Restore started.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  extracted_paths:
                    type: array
                    items: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /backups/targets:
    get:
      operationId: backups.list_targets
      tags: [backups]
      summary: List saved backup targets (SFTP, SMB, WebDAV, S3, local)
      responses:
        "200":
          description: Targets.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BackupTarget" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: backups.create_target
      tags: [backups]
      summary: Create a new backup target
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BackupTargetInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupTarget" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /backups/targets/{id}:
    parameters:
      - $ref: "#/components/parameters/IntIDPath"
    put:
      operationId: backups.update_target
      tags: [backups]
      summary: Update a backup target
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BackupTargetInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupTarget" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: backups.delete_target
      tags: [backups]
      summary: Delete a backup target
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Target is referenced by one or more jobs.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /backups/targets/{id}/test:
    post:
      operationId: backups.test_target
      tags: [backups]
      summary: Verify connectivity to a saved target
      parameters:
        - $ref: "#/components/parameters/IntIDPath"
      responses:
        "200":
          description: Connection OK.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupTargetTestResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Connection failed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupTargetTestResult" }

  /backups/targets/test-config:
    post:
      operationId: backups.test_target_config
      tags: [backups]
      summary: Verify an unsaved target config (pre-create smoke test)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BackupTargetInput" }
      responses:
        "200":
          description: Connection OK.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupTargetTestResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "502":
          description: Connection failed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupTargetTestResult" }

  /backups/targets/discover-shares:
    post:
      operationId: backups.discover_shares
      tags: [backups]
      summary: List SMB shares on a host (pre-create helper)
      description: Used by the target-create dialog to autocomplete share names.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [host, username, password]
              properties:
                host: { type: string }
                username: { type: string }
                password: { type: string, format: password }
                domain: { type: string }
      responses:
        "200":
          description: Shares.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "502":
          description: Connection failed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /backups/system/enabled:
    put:
      operationId: backups.toggle_system
      tags: [backups]
      summary: Enable / disable the default daily system backup (P.6.5)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled: { type: boolean }
      responses:
        "200":
          description: New backup status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # -----------------------------------------------------------------------
  # alerts + notifications
  # -----------------------------------------------------------------------
  /alerts/rules:
    get:
      operationId: alerts.list_rules
      tags: [alerts]
      summary: List alert rules (built-in + user-defined)
      responses:
        "200":
          description: Rules.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AlertRule" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: alerts.create_rule
      tags: [alerts]
      summary: Create a user-defined alert rule
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AlertRuleInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertRule" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /alerts/rules/{id}:
    parameters:
      - $ref: "#/components/parameters/IntIDPath"
    put:
      operationId: alerts.update_rule
      tags: [alerts]
      summary: Update an alert rule (including enabled flag on built-ins)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AlertRuleInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AlertRule" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: alerts.delete_rule
      tags: [alerts]
      summary: Delete a user-defined alert rule
      description: Built-in rules cannot be deleted — disable them instead (P.11.5). Returns 409 for built-ins.
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Rule is built-in and cannot be deleted — disable instead.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /alerts/history:
    get:
      operationId: alerts.history
      tags: [alerts]
      summary: Recent alert events (fire + resolve), newest first
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
      responses:
        "200":
          description: History.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AlertHistoryEntry" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /notifications/channels:
    get:
      operationId: notifications.list_channels
      tags: [alerts]
      summary: List configured notification channels
      responses:
        "200":
          description: Channels.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/NotificationChannel" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: notifications.create_channel
      tags: [alerts]
      summary: Create a notification channel (webhook, email, slack, …)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotificationChannelInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationChannel" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /notifications/channels/{id}:
    parameters:
      - $ref: "#/components/parameters/IntIDPath"
    put:
      operationId: notifications.update_channel
      tags: [alerts]
      summary: Update a notification channel
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotificationChannelInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationChannel" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: notifications.delete_channel
      tags: [alerts]
      summary: Delete a notification channel
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /notifications/channels/{id}/test:
    post:
      operationId: notifications.test_channel
      tags: [alerts]
      summary: Send a test notification through the channel
      parameters:
        - $ref: "#/components/parameters/IntIDPath"
      responses:
        "204": { description: Test sent. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Delivery failed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # -----------------------------------------------------------------------
  # audit log (tamper-evident)
  # -----------------------------------------------------------------------
  /audit:
    get:
      operationId: audit.list
      tags: [audit]
      summary: Audit log entries, newest first
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 100, maximum: 1000 }
        - name: action
          in: query
          schema: { type: string }
          description: Filter by action prefix (e.g. `container.`).
        - name: user_id
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Entries.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditEntry" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /audit/verify:
    get:
      operationId: audit.verify
      tags: [audit]
      summary: Verify the hash chain from genesis to the latest entry
      description: |
        Re-computes each row's `row_hash` from the prior hash + canonical
        fields. A broken chain indicates tampering.
      responses:
        "200":
          description: Verification result.
          content:
            application/json:
              schema:
                type: object
                required: [ok, verified_rows]
                properties:
                  ok: { type: boolean }
                  verified_rows: { type: integer }
                  first_broken_id: { type: integer, format: int64 }
                  message: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # -----------------------------------------------------------------------
  # system — server-wide runtime info and host metrics
  # -----------------------------------------------------------------------
  /system/info:
    get:
      operationId: system.info
      tags: [metrics]
      summary: Dockmesh version + build info
      responses:
        "200":
          description: Instance info.
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string }
                  commit: { type: string }
                  build_date: { type: string }
                  go_version: { type: string }
                  os: { type: string }
                  arch: { type: string }
                  uptime_seconds: { type: integer, format: int64 }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /system/metrics:
    get:
      operationId: system.metrics
      tags: [metrics]
      summary: Host-level CPU / memory / disk / uptime snapshot
      description: Used by the dashboard's System Health panel. Works across local and remote hosts.
      parameters:
        - $ref: "#/components/parameters/HostQuery"
      responses:
        "200":
          description: Snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  cpu_percent: { type: number }
                  cpu_cores: { type: integer }
                  cpu_used_cores: { type: number }
                  mem_percent: { type: number }
                  mem_total: { type: integer, format: int64 }
                  mem_used: { type: integer, format: int64 }
                  disk_percent: { type: number }
                  disk_total: { type: integer, format: int64 }
                  disk_used: { type: integer, format: int64 }
                  uptime_seconds: { type: integer, format: int64 }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /system/backup-status:
    get:
      operationId: system.backup_status
      tags: [metrics]
      summary: Default system backup summary for the sidebar pill
      responses:
        "200":
          description: Backup status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BackupStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # -----------------------------------------------------------------------
  # users — local-user CRUD + self-profile
  # -----------------------------------------------------------------------
  /me:
    get:
      operationId: users.me
      tags: [users]
      summary: The authenticated user's own profile
      description: Includes role, scope_tags, and MFA state — used by the UI to gate buttons.
      responses:
        "200":
          description: Profile.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /users:
    get:
      operationId: users.list
      tags: [users]
      summary: List all local users
      responses:
        "200":
          description: Users.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: users.create
      tags: [users]
      summary: Create a new local user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, role]
              properties:
                username: { type: string, minLength: 1 }
                email: { type: string, format: email }
                password: { type: string, format: password, minLength: 8 }
                role:
                  type: string
                  description: Role name — `admin`, `operator`, `viewer`, or a custom role.
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Username already taken.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /users/{id}:
    parameters:
      - $ref: "#/components/parameters/UserIDPath"
    put:
      operationId: users.update
      tags: [users]
      summary: Update user email, role, and scope tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                role: { type: string }
                scope_tags:
                  type: array
                  items: { type: string }
                  description: Host tag scope. Empty = access to all hosts.
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: users.delete
      tags: [users]
      summary: Delete a local user
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /users/{id}/password:
    put:
      operationId: users.change_password
      tags: [users]
      summary: Admin-set a user's password
      description: Minimum 8 chars. Admin-only — regular users change their own password via a (future) self-service endpoint.
      parameters:
        - $ref: "#/components/parameters/UserIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string, format: password, minLength: 8 }
      responses:
        "204": { description: Password updated. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /users/{id}/mfa:
    delete:
      operationId: users.mfa_reset
      tags: [users]
      summary: "Admin: clear MFA for a user"
      description: Used when a user has lost access to their TOTP device and recovery codes.
      parameters:
        - $ref: "#/components/parameters/UserIDPath"
      responses:
        "204": { description: MFA cleared. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # -----------------------------------------------------------------------
  # roles — custom role definitions + permission catalogue
  # -----------------------------------------------------------------------
  /roles:
    get:
      operationId: roles.list
      tags: [roles]
      summary: List roles (built-in + custom)
      responses:
        "200":
          description: Roles.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CustomRole" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: roles.create
      tags: [roles]
      summary: Create a custom role
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoleInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomRole" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Role name already exists.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /roles/permissions:
    get:
      operationId: roles.permissions
      tags: [roles]
      summary: Catalogue of permissions that can be granted to a role
      description: |
        Returns all `Perm` values the server knows about with a
        human-readable description. Used by the role-create dialog to
        render the permission-picker.
      responses:
        "200":
          description: Permission catalogue.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string, example: container.control }
                    description: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /roles/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: roles.get
      tags: [roles]
      summary: Inspect one role
      responses:
        "200":
          description: Role.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomRole" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: roles.update
      tags: [roles]
      summary: Update a custom role's display name + permissions
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RoleInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CustomRole" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Role is built-in (cannot be renamed).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: roles.delete
      tags: [roles]
      summary: Delete a custom role
      description: Built-in roles cannot be deleted — returns 409.
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Role is built-in or still referenced by users.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # -----------------------------------------------------------------------
  # oidc — provider configuration (admin-only)
  # -----------------------------------------------------------------------
  /oidc/providers:
    get:
      operationId: oidc.list_providers
      tags: [oidc]
      summary: List configured OIDC providers (includes disabled + secrets redacted)
      responses:
        "200":
          description: Providers.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OIDCProvider" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: oidc.create_provider
      tags: [oidc]
      summary: Add an OIDC provider
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OIDCProviderInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OIDCProvider" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Slug already in use.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /oidc/providers/reload:
    post:
      operationId: oidc.reload
      tags: [oidc]
      summary: Re-discover metadata for all enabled providers
      description: Forces a refresh of well-known endpoints (jwks, authorize, token URLs).
      responses:
        "200":
          description: Reload summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reloaded: { type: integer }
                  failed: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /oidc/providers/{id}:
    parameters:
      - $ref: "#/components/parameters/IntIDPath"
    put:
      operationId: oidc.update_provider
      tags: [oidc]
      summary: Update an OIDC provider
      description: Send an empty `client_secret` to keep the existing secret.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OIDCProviderInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OIDCProvider" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: oidc.delete_provider
      tags: [oidc]
      summary: Delete an OIDC provider
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # -----------------------------------------------------------------------
  # api-tokens — long-lived bearer tokens for CI (P.11.1)
  # -----------------------------------------------------------------------
  /settings/api-tokens:
    get:
      operationId: api_tokens.list
      tags: [api-tokens]
      summary: List API tokens (plaintext is NOT returned — only the prefix)
      responses:
        "200":
          description: Tokens.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ApiToken" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: api_tokens.create
      tags: [api-tokens]
      summary: Create a new API token
      description: |
        The plaintext token is returned ONCE in the `token` field. It is
        never retrievable afterwards — lose it and you must revoke +
        recreate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, role]
              properties:
                name: { type: string, example: github-deploy }
                role: { type: string, example: operator }
                expires_in_days:
                  type: integer
                  minimum: 0
                  default: 90
                  description: 0 = never expires.
      responses:
        "201":
          description: Created with one-time plaintext.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiToken"
                  - type: object
                    required: [token]
                    properties:
                      token:
                        type: string
                        description: Full plaintext `dmt_…` value. Save it now.
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /settings/api-tokens/{id}:
    delete:
      operationId: api_tokens.revoke
      tags: [api-tokens]
      summary: Revoke an API token (soft delete — sets revoked_at)
      parameters:
        - $ref: "#/components/parameters/IntIDPath"
      responses:
        "204": { description: Revoked. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # -----------------------------------------------------------------------
  # registries — private-image credentials (P.11.7)
  # -----------------------------------------------------------------------
  /settings/registries:
    get:
      operationId: registries.list
      tags: [registries]
      summary: List saved registry credentials (passwords redacted)
      responses:
        "200":
          description: Registries.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Registry" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      operationId: registries.create
      tags: [registries]
      summary: Save a new registry credential
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegistryInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Registry" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: A registry with this URL already exists.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /settings/registries/{id}:
    parameters:
      - $ref: "#/components/parameters/IntIDPath"
    put:
      operationId: registries.update
      tags: [registries]
      summary: Update a saved registry
      description: |
        `password` empty = keep existing. Set `clear_password: true` to
        explicitly wipe the stored password.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegistryInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Registry" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Another registry already has this URL.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    delete:
      operationId: registries.delete
      tags: [registries]
      summary: Delete a registry entry
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /settings/registries/{id}/test:
    post:
      operationId: registries.test
      tags: [registries]
      summary: Verify credentials by calling docker RegistryLogin
      parameters:
        - $ref: "#/components/parameters/IntIDPath"
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
                  status: { type: string }
                  identity: { type: boolean }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502":
          description: Registry rejected the credentials.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  error: { type: string }

  # -----------------------------------------------------------------------
  # settings — server-wide runtime config (DB-backed)
  # -----------------------------------------------------------------------
  /settings:
    get:
      operationId: settings.list
      tags: [settings]
      summary: Effective server settings (runtime-overridable key/value pairs)
      responses:
        "200":
          description: Settings.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [key, value]
                  properties:
                    key: { type: string }
                    value: { type: string }
                    from_env: { type: boolean, description: True when the value was read from env vars instead of DB. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    put:
      operationId: settings.update
      tags: [settings]
      summary: Update one or more settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: { type: string }
              example:
                DOCKMESH_BASE_URL: "https://dockmesh.example.com"
      responses:
        "204": { description: Saved. }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  # -----------------------------------------------------------------------
  # global-env — shared env variables available to every stack deploy
  # -----------------------------------------------------------------------
  /global-env:
    get:
      operationId: global_env.list
      tags: [global-env]
      summary: List shared env variables across all groups
      responses:
        "200":
          description: Variables.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GlobalEnvItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: global_env.create
      tags: [global-env]
      summary: Add a shared env variable
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GlobalEnvInput" }
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlobalEnvItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Key already exists within the group.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /global-env/groups:
    get:
      operationId: global_env.list_groups
      tags: [global-env]
      summary: Distinct group names defined on the global-env items
      responses:
        "200":
          description: Groups.
          content:
            application/json:
              schema:
                type: array
                items: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /global-env/{id}:
    parameters:
      - $ref: "#/components/parameters/IntIDPath"
    put:
      operationId: global_env.update
      tags: [global-env]
      summary: Update a shared env variable
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GlobalEnvInput" }
      responses:
        "200":
          description: Updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GlobalEnvItem" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: global_env.delete
      tags: [global-env]
      summary: Remove a shared env variable
      responses:
        "204": { description: Deleted. }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # -----------------------------------------------------------------------
  # migrations — stack migration listings (detail lives under /stacks)
  # -----------------------------------------------------------------------
  /migrations:
    get:
      operationId: migrations.list
      tags: [migrations]
      summary: Recent migrations across all stacks (history)
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 100 }
      responses:
        "200":
          description: Migrations.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MigrationStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /migrations/active:
    get:
      operationId: migrations.active
      tags: [migrations]
      summary: Currently-running migrations
      responses:
        "200":
          description: In-flight migrations only.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MigrationStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # -----------------------------------------------------------------------
  # drain — safely evacuate a host before maintenance (P.10)
  # -----------------------------------------------------------------------
  /hosts/{id}/drain/plan:
    post:
      operationId: drain.plan
      tags: [migrations]
      summary: Dry-run a drain — list what would move and where
      description: |
        Given a set of candidate target hosts, produces a plan that maps
        each stack on the source host to a target host. Safe to call —
        does not start any migration.
      parameters:
        - $ref: "#/components/parameters/HostIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_host_ids:
                  type: array
                  items: { type: string, format: uuid }
                  description: Candidate target hosts. If omitted, all online hosts are considered.
                strategy:
                  type: string
                  enum: [least-loaded, explicit, round-robin]
                  default: least-loaded
      responses:
        "200":
          description: Plan.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DrainPlan" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /hosts/{id}/drain/execute:
    post:
      operationId: drain.execute
      tags: [migrations]
      summary: Start the drain — migrate stacks off the source host
      description: |
        Kicks off sequential stack migrations according to the plan (or
        a computed default plan). Returns a drain id for progress polling.
      parameters:
        - $ref: "#/components/parameters/HostIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plan: { $ref: "#/components/schemas/DrainPlan" }
                target_host_ids:
                  type: array
                  items: { type: string, format: uuid }
                strategy:
                  type: string
                  enum: [least-loaded, explicit, round-robin]
      responses:
        "202":
          description: Drain accepted — poll `/hosts/{id}/drain/{drain_id}`.
          content:
            application/json:
              schema:
                type: object
                properties:
                  drain_id: { type: integer, format: int64 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: A drain is already running for this host.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /hosts/{id}/drain/{drain_id}:
    parameters:
      - $ref: "#/components/parameters/HostIDPath"
      - $ref: "#/components/parameters/DrainIDPath"
    get:
      operationId: drain.status
      tags: [migrations]
      summary: Poll drain progress
      responses:
        "200":
          description: Current state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DrainStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /hosts/{id}/drain/{drain_id}/pause:
    post:
      operationId: drain.pause
      tags: [migrations]
      summary: Pause a running drain between stacks
      parameters:
        - $ref: "#/components/parameters/HostIDPath"
        - $ref: "#/components/parameters/DrainIDPath"
      responses:
        "200":
          description: Paused.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DrainStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Drain is not in a state that can be paused.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /hosts/{id}/drain/{drain_id}/resume:
    post:
      operationId: drain.resume
      tags: [migrations]
      summary: Resume a paused drain
      parameters:
        - $ref: "#/components/parameters/HostIDPath"
        - $ref: "#/components/parameters/DrainIDPath"
      responses:
        "200":
          description: Resumed.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DrainStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /hosts/{id}/drain/{drain_id}/abort:
    post:
      operationId: drain.abort
      tags: [migrations]
      summary: Abort a drain; in-flight migrations are rolled back
      parameters:
        - $ref: "#/components/parameters/HostIDPath"
        - $ref: "#/components/parameters/DrainIDPath"
      responses:
        "200":
          description: Aborted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DrainStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /containers/{id}/metrics:
    get:
      operationId: containers.metrics
      tags: [containers]
      summary: Historical CPU / memory / network / disk samples
      description: |
        Returns time-series samples from the internal metrics collector
        (30s raw, 1m, 1h retention per concept §15.4). Used by the
        container detail page's charts.
      parameters:
        - $ref: "#/components/parameters/ContainerIDPath"
        - name: resolution
          in: query
          schema: { type: string, enum: [raw, 1m, 1h], default: raw }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Metric samples.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    ts: { type: string, format: date-time }
                    cpu_percent: { type: number }
                    mem_bytes: { type: integer, format: int64 }
                    mem_percent: { type: number }
                    net_rx_bytes: { type: integer, format: int64 }
                    net_tx_bytes: { type: integer, format: int64 }
                    block_read_bytes: { type: integer, format: int64 }
                    block_write_bytes: { type: integer, format: int64 }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "JWT or dmt_<40-char-base64url>"
      description: |
        Accepts either a user session JWT (from `POST /auth/login`) or an API
        token (prefix `dmt_`, from Settings → API Tokens). The route layer
        checks role permissions after authentication.

  # Schemas used across multiple groups live here. Group-specific schemas
  # live inline under the operation to keep the spec readable when new
  # groups get added.
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid credentials

    Empty:
      type: object
      description: Empty body — use for 204 No Content endpoints.

    User:
      type: object
      required: [id, username, role, mfa_enabled]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        email: { type: string, format: email }
        role: { type: string, example: operator }
        scope_tags:
          type: array
          items: { type: string }
          description: Host tags this user is scoped to. Empty / omitted = access to all hosts.
        mfa_enabled: { type: boolean }

    StackInput:
      type: object
      required: [name, compose]
      description: Payload for create / update.
      properties:
        name: { type: string, example: my-app }
        compose:
          type: string
          description: Full compose.yaml content.
        env:
          type: string
          description: Optional plaintext .env content. Stored age-encrypted when secrets encryption is enabled.

    StackDetail:
      type: object
      required: [name, compose]
      properties:
        name: { type: string }
        compose: { type: string }
        env: { type: string }

    StackDeployment:
      type: object
      description: Where and when a stack was last deployed.
      properties:
        host_id: { type: string }
        host_name: { type: string }
        deployed_at: { type: string, format: date-time }
        status: { type: string, enum: [deployed, failed, stopped, unknown] }

    StackListEntry:
      type: object
      properties:
        name: { type: string }
        compose_path: { type: string }
        deployment: { $ref: "#/components/schemas/StackDeployment" }

    DeployResult:
      type: object
      properties:
        stack: { type: string }
        created:
          type: array
          items: { type: string }
          description: Services whose containers were created fresh.
        updated:
          type: array
          items: { type: string }
        unchanged:
          type: array
          items: { type: string }
        skipped:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }

    ScalingRule:
      type: object
      required: [service, metric, operator, threshold]
      properties:
        service: { type: string }
        metric: { type: string, enum: [cpu_percent, mem_percent] }
        operator: { type: string, enum: [gt, lt] }
        threshold: { type: number }
        min_replicas: { type: integer }
        max_replicas: { type: integer }
        cooldown_seconds: { type: integer }
        duration_seconds: { type: integer }

    OIDCProvider:
      type: object
      required: [id, slug, display_name, issuer_url, client_id, default_role, enabled]
      description: Configured OIDC provider. `client_secret` is redacted.
      properties:
        id: { type: integer, format: int64 }
        slug: { type: string, example: google }
        display_name: { type: string }
        issuer_url: { type: string, format: uri }
        client_id: { type: string }
        scopes: { type: string, example: "openid profile email" }
        group_claim: { type: string }
        admin_group: { type: string }
        operator_group: { type: string }
        default_role: { type: string }
        default_scope_tags:
          type: array
          items: { type: string }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    OIDCProviderInput:
      type: object
      required: [slug, display_name, issuer_url, client_id, default_role]
      properties:
        slug: { type: string }
        display_name: { type: string }
        issuer_url: { type: string, format: uri }
        client_id: { type: string }
        client_secret:
          type: string
          format: password
          description: Omit / empty on update to keep the existing secret.
        scopes: { type: string }
        group_claim: { type: string }
        admin_group: { type: string }
        operator_group: { type: string }
        default_role: { type: string }
        enabled: { type: boolean }

    ApiToken:
      type: object
      description: Long-lived bearer token (P.11.1). Plaintext is NEVER returned except the one-time create response.
      required: [id, prefix, name, role, created_at]
      properties:
        id: { type: integer, format: int64 }
        prefix: { type: string, example: "dmt_A7f3X9c4" }
        name: { type: string }
        role: { type: string }
        created_by: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time }
        last_used_ip: { type: string }
        revoked_at: { type: string, format: date-time }

    Registry:
      type: object
      description: Saved private-registry credentials (P.11.7).
      required: [id, name, url, has_password, created_at, updated_at]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        url: { type: string, example: ghcr.io }
        username: { type: string }
        has_password:
          type: boolean
          description: True when a password is stored. The plaintext is never returned.
        scope_tags:
          type: array
          items: { type: string }
          description: Host tag scope. Empty = apply to all hosts.
        last_tested_at: { type: string, format: date-time }
        last_test_ok: { type: boolean }
        last_test_error: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    RegistryInput:
      type: object
      required: [name, url]
      properties:
        name: { type: string }
        url: { type: string }
        username: { type: string }
        password:
          type: string
          format: password
          description: Omit / empty on update to keep the existing password.
        clear_password:
          type: boolean
          description: Explicitly wipe the stored password. Takes precedence over `password`.
        scope_tags:
          type: array
          items: { type: string }

    GlobalEnvItem:
      type: object
      required: [id, key, value, group_name, encrypted]
      properties:
        id: { type: integer, format: int64 }
        key: { type: string }
        value: { type: string }
        group_name: { type: string }
        encrypted:
          type: boolean
          description: True when the value is age-encrypted at rest.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    GlobalEnvInput:
      type: object
      required: [key, value, group_name]
      properties:
        key: { type: string }
        value: { type: string }
        group_name: { type: string, example: production }

    CustomRole:
      type: object
      required: [name, display, permissions]
      properties:
        name: { type: string, example: operator }
        display: { type: string, example: "Operator — manages running containers" }
        builtin:
          type: boolean
          description: Built-in roles (admin, operator, viewer) cannot be renamed or deleted.
        permissions:
          type: array
          items: { type: string }

    RoleInput:
      type: object
      required: [name, display, permissions]
      properties:
        name: { type: string, example: deploy-bot }
        display: { type: string }
        permissions:
          type: array
          items: { type: string }

    BackupSource:
      type: object
      required: [type, name]
      properties:
        type:
          type: string
          enum: [volume, stack, system]
          description: "`system` snapshots the Dockmesh server's own DB + stacks tree."
        name: { type: string, description: "Ignored for system source." }

    BackupHook:
      type: object
      description: docker-exec invocation used to quiesce a container before the snapshot (e.g. pg_dump).
      required: [container, cmd]
      properties:
        container: { type: string }
        cmd:
          type: array
          items: { type: string }

    BackupJob:
      type: object
      required: [id, name, target_type, sources, schedule, enabled]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        target_type: { type: string, enum: [local, sftp, smb, webdav, s3] }
        target_config:
          type: object
          description: Target-specific credentials/paths. Secrets redacted in responses.
        sources:
          type: array
          items: { $ref: "#/components/schemas/BackupSource" }
        schedule: { type: string, description: Cron expression. }
        retention_count: { type: integer, minimum: 0 }
        retention_days: { type: integer, minimum: 0 }
        encrypt: { type: boolean, description: Encrypt the tarball with the age key. }
        pre_hooks:
          type: array
          items: { $ref: "#/components/schemas/BackupHook" }
        post_hooks:
          type: array
          items: { $ref: "#/components/schemas/BackupHook" }
        enabled: { type: boolean }
        last_run_at: { type: string, format: date-time }
        next_run_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    BackupJobInput:
      type: object
      required: [name, target_type, sources, schedule]
      properties:
        name: { type: string }
        target_type: { type: string, enum: [local, sftp, smb, webdav, s3] }
        target_config: { type: object }
        sources:
          type: array
          items: { $ref: "#/components/schemas/BackupSource" }
        schedule: { type: string }
        retention_count: { type: integer, minimum: 0 }
        retention_days: { type: integer, minimum: 0 }
        encrypt: { type: boolean }
        pre_hooks:
          type: array
          items: { $ref: "#/components/schemas/BackupHook" }
        post_hooks:
          type: array
          items: { $ref: "#/components/schemas/BackupHook" }
        enabled: { type: boolean }

    BackupRun:
      type: object
      required: [id, job_id, job_name, status, started_at]
      properties:
        id: { type: integer, format: int64 }
        job_id: { type: integer, format: int64 }
        job_name: { type: string }
        status: { type: string, enum: [running, success, failed] }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }
        size_bytes: { type: integer, format: int64 }
        target_path: { type: string }
        sha256: { type: string }
        encrypted: { type: boolean }
        error: { type: string }
        sources:
          type: array
          items: { $ref: "#/components/schemas/BackupSource" }

    BackupTarget:
      type: object
      required: [id, name, type, status]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        type: { type: string, enum: [local, sftp, smb, webdav, s3] }
        config:
          type: object
          description: Credentials redacted.
        status: { type: string, enum: [unknown, ok, degraded, unreachable] }
        total_bytes: { type: integer, format: int64 }
        used_bytes: { type: integer, format: int64 }
        last_checked_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    BackupTargetInput:
      type: object
      required: [name, type, config]
      properties:
        name: { type: string }
        type: { type: string, enum: [local, sftp, smb, webdav, s3] }
        config: { type: object }

    BackupTargetTestResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        latency_ms: { type: integer }
        total_bytes: { type: integer, format: int64 }
        free_bytes: { type: integer, format: int64 }
        error: { type: string }

    BackupStatus:
      type: object
      properties:
        enabled: { type: boolean }
        last_run_at: { type: string, format: date-time }
        last_run_status: { type: string, enum: [success, failed, running] }
        last_run_size_bytes: { type: integer, format: int64 }
        last_run_age_seconds: { type: integer }
        next_run_at: { type: string, format: date-time }

    AlertRule:
      type: object
      required: [id, name, metric, operator, threshold, enabled]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        container_filter: { type: string, description: Glob pattern matched against container names. }
        metric: { type: string, enum: [cpu_percent, mem_percent] }
        operator: { type: string, enum: [gt, lt] }
        threshold: { type: number }
        duration_seconds: { type: integer, minimum: 0 }
        cooldown_seconds: { type: integer, minimum: 0 }
        channel_ids:
          type: array
          items: { type: integer, format: int64 }
        severity: { type: string, enum: [info, warning, critical] }
        enabled: { type: boolean }
        builtin:
          type: boolean
          description: "Built-in rules (P.11.5) cannot be deleted; disable instead."
        muted_until: { type: string, format: date-time }
        firing_since: { type: string, format: date-time }
        last_triggered_at: { type: string, format: date-time }
        last_resolved_at: { type: string, format: date-time }

    AlertRuleInput:
      type: object
      required: [name, metric, operator, threshold]
      properties:
        name: { type: string }
        container_filter: { type: string }
        metric: { type: string, enum: [cpu_percent, mem_percent] }
        operator: { type: string, enum: [gt, lt] }
        threshold: { type: number }
        duration_seconds: { type: integer, minimum: 0 }
        cooldown_seconds: { type: integer, minimum: 0 }
        channel_ids:
          type: array
          items: { type: integer, format: int64 }
        severity: { type: string, enum: [info, warning, critical] }
        enabled: { type: boolean }
        muted_until: { type: string, format: date-time }

    AlertHistoryEntry:
      type: object
      required: [id, rule_id, rule_name, status, occurred_at]
      properties:
        id: { type: integer, format: int64 }
        rule_id: { type: integer, format: int64 }
        rule_name: { type: string }
        container_name: { type: string }
        status: { type: string, enum: [fired, resolved] }
        message: { type: string }
        value: { type: number }
        threshold: { type: number }
        occurred_at: { type: string, format: date-time }

    NotificationChannel:
      type: object
      required: [id, name, type]
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        type:
          type: string
          enum: [webhook, email, slack, discord, telegram, ntfy, gotify, msteams]
        config:
          type: object
          description: Channel-type-specific. Secrets redacted.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    NotificationChannelInput:
      type: object
      required: [name, type, config]
      properties:
        name: { type: string }
        type: { type: string }
        config: { type: object }

    AuditEntry:
      type: object
      required: [id, ts, action]
      description: |
        Tamper-evident: each row's `row_hash` chains to the previous
        entry's `prev_hash`. The genesis row anchors the chain against a
        file stored outside the DB.
      properties:
        id: { type: integer, format: int64 }
        ts: { type: string, format: date-time }
        user_id: { type: string }
        username: { type: string }
        action: { type: string, example: container.start }
        target: { type: string }
        details: { type: string, description: JSON-encoded contextual metadata. }
        prev_hash: { type: string }
        row_hash: { type: string }

    DrainPlan:
      type: object
      description: |
        Map of source-host stacks to target hosts. Returned by
        `/hosts/{id}/drain/plan` and accepted as the input to
        `/hosts/{id}/drain/execute`.
      properties:
        source_host_id: { type: string, format: uuid }
        strategy: { type: string, enum: [least-loaded, explicit, round-robin] }
        assignments:
          type: array
          items:
            type: object
            required: [stack, target_host_id]
            properties:
              stack: { type: string }
              target_host_id: { type: string, format: uuid }
              target_host_name: { type: string }
              volume_bytes: { type: integer, format: int64 }

    DrainStatus:
      type: object
      required: [id, source_host_id, status]
      properties:
        id: { type: integer, format: int64 }
        source_host_id: { type: string, format: uuid }
        status:
          type: string
          enum: [pending, running, paused, completed, failed, aborted]
        plan: { $ref: "#/components/schemas/DrainPlan" }
        progress:
          type: object
          properties:
            total: { type: integer }
            done: { type: integer }
            current_stack: { type: string }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }
        message: { type: string }

    VolumeEntry:
      type: object
      description: One row in a volume directory listing (P.11.8).
      required: [name, type, size, mode, mod_time]
      properties:
        name: { type: string }
        type:
          type: string
          enum: [file, dir, symlink]
        size: { type: integer, format: int64 }
        mode: { type: string, description: Unix-style "rwxr-xr-x" string. }
        mod_time: { type: string, format: date-time }
        link_dest: { type: string, description: For symlinks, the target path. }

    VolumeFileResult:
      type: object
      description: Inline file read from a volume (P.11.8).
      required: [content, size, truncated, binary]
      properties:
        content:
          type: string
          format: byte
          description: Base64-encoded file bytes — capped at 1 MiB.
        size:
          type: integer
          format: int64
          description: Actual file size on disk (may exceed content length when truncated).
        truncated: { type: boolean }
        binary:
          type: boolean
          description: True when the first 8 KiB contain a NUL byte.

    MigrationStatus:
      type: object
      required: [id, stack, status]
      properties:
        id: { type: integer, format: int64 }
        stack: { type: string }
        source_host_id: { type: string }
        target_host_id: { type: string }
        status:
          type: string
          enum: [pending, copying, deploying, verifying, succeeded, failed, rolled_back]
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }
        progress_percent: { type: number }
        message: { type: string }

    Container:
      type: object
      description: |
        Docker container summary. Mirrors the Docker SDK's
        `types.Container` with `host_id` + `host_name` added when the
        response comes from a fan-out list. Most fields are passthrough.
      properties:
        Id: { type: string }
        Names:
          type: array
          items: { type: string }
        Image: { type: string }
        ImageID: { type: string }
        Command: { type: string }
        Created: { type: integer, format: int64 }
        State:
          type: string
          enum: [created, restarting, running, removing, paused, exited, dead]
        Status: { type: string, example: "Up 5 minutes" }
        Labels:
          type: object
          additionalProperties: { type: string }
        host_id: { type: string }
        host_name: { type: string }

    FanOutResponse:
      type: object
      description: |
        Returned by list endpoints when `?host=all`. `items` is the flat
        aggregated list; `errors` lists hosts that failed to respond so
        the UI can show partial results with a warning banner.
      required: [items]
      properties:
        items:
          type: array
          items: { type: object }
          description: Rows from every host that answered. Shape depends on the endpoint.
        errors:
          type: array
          items:
            type: object
            properties:
              host_id: { type: string }
              host_name: { type: string }
              error: { type: string }

    HostInfo:
      type: object
      required: [id, name, kind, status]
      properties:
        id:
          type: string
          description: '"local" for the central daemon, otherwise an agent UUID.'
        name: { type: string }
        kind:
          type: string
          enum: [local, agent]
        status:
          type: string
          enum: [online, offline, pending, revoked]
        tags:
          type: array
          items: { type: string }

    Agent:
      type: object
      required: [id, name, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status:
          type: string
          enum: [pending, online, offline, revoked]
        version: { type: string }
        os: { type: string }
        arch: { type: string }
        hostname: { type: string }
        docker_version: { type: string }
        cert_fingerprint: { type: string }
        last_seen_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AgentCreateResult:
      type: object
      required: [agent, token, install_hint]
      description: |
        Returned ONCE on agent creation. `token` is shown only here —
        losing it means you have to delete and recreate the agent.
      properties:
        agent: { $ref: "#/components/schemas/Agent" }
        token:
          type: string
          description: One-time enrollment token. Paste into the install command on the agent host.
        enroll_url:
          type: string
          format: uri
        agent_url:
          type: string
          description: wss:// URL the agent will dial after enrollment.
        install_hint:
          type: string
          description: Single-line install command to run on the agent host as root.

    AgentEnrollRequest:
      type: object
      required: [token, hostname, os, arch, version]
      properties:
        token: { type: string }
        hostname: { type: string }
        os: { type: string, example: linux }
        arch: { type: string, example: amd64 }
        version: { type: string }
        docker_version: { type: string }

    AgentEnrollResponse:
      type: object
      required: [agent_id, agent_name, client_cert, client_key, ca_cert, agent_url]
      properties:
        agent_id: { type: string, format: uuid }
        agent_name: { type: string }
        client_cert: { type: string, description: PEM-encoded client cert. }
        client_key: { type: string, description: PEM-encoded private key (shown once). }
        ca_cert: { type: string, description: PEM-encoded CA cert the agent should pin. }
        agent_url: { type: string, description: wss:// URL the agent should dial. }

    LoginResult:
      type: object
      description: |
        Either a fresh session (access+refresh+user) or an MFA challenge
        (`mfa_required: true` + `mfa_token`) that clients must complete via
        `POST /auth/mfa` before getting a session.
      properties:
        access_token:
          type: string
          description: "15-minute-TTL JWT. Send as `Authorization: Bearer <token>`."
        refresh_token:
          type: string
          description: "Opaque token for `/auth/refresh`. Rotates on every use."
        user:
          $ref: "#/components/schemas/User"
        mfa_required:
          type: boolean
          description: "True when the user has MFA enabled — use `mfa_token` with `/auth/mfa`."
        mfa_token:
          type: string
          description: "Short-lived challenge token for the `/auth/mfa` completion."

  parameters:
    HostQuery:
      name: host
      in: query
      description: "Target host id. Empty or `local` = central server's daemon; otherwise an agent UUID. `all` fans out to every online host."
      required: false
      schema:
        type: string
        default: local
    HostIDPath:
      name: id
      in: path
      description: Host id — "local" for the central daemon, otherwise an agent UUID.
      required: true
      schema:
        type: string
    ContainerIDPath:
      name: id
      in: path
      description: Container id (long or short form) or name.
      required: true
      schema:
        type: string
    StackNamePath:
      name: name
      in: path
      description: Stack name — matches `[a-z0-9][a-z0-9-]*[a-z0-9]`, 2..63 chars.
      required: true
      schema:
        type: string
    ServicePath:
      name: service
      in: path
      description: Service name as declared in the compose file.
      required: true
      schema:
        type: string
    IntIDPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Integer primary key.
    UserIDPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User id (UUID).
    DrainIDPath:
      name: drain_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Drain run id.

  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated but the token's role lacks the required permission.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Malformed request body or invalid parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: The operation conflicts with existing state (e.g. duplicate name, built-in rule deletion).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
